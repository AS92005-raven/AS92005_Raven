<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="navbar">
       <div class="logo">
           <i class="fa-solid fa-earth-oceania"></i>
       </div>
       <nav class="nav-links">
           <a href="#" class="nav-item"><i class="fa-solid fa-house"></i> home </a>  <! --- house logo for homepage  --- >
           <a href="#" class="nav-item"><i class="fa-solid fa-screwdriver screwdriver-icon"></i> fix </a>  <! --- tool logo for fix --- >
           <a href="#" class="nav-item active"><i class="fa-solid fa-phone"></i> contact us</a>  <! --- phone logo for contacts --- >
       </nav>
   </header>

<main class="container">
       <header class="hero-section">
           <div class="badge-title">Contact us</div>

<!-- Replace your@email.com with your actual email address -->
    <form action="https://formspree.io/f/{form_id}" method="POST">

        <!-- Name Field -->
        <div>
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" placeholder="John Smith" required>
        </div>
        <br>

        <!-- Email Field -->
        <div>
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="example@domain.com" required>
        </div>
        <br>

        <!-- Message Field -->
        <div>
            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
        </div>
        <br>

        <!-- Submit Button -->
        <button type="submit">Send Message</button>

    </form>

<div class="pagination-controls">
           <button class="nav-btn" aria-label="Previous Page"><i class="fa-solid fa-arrow-left-long"></i></button>
           <button class="nav-btn" aria-label="Next Page"><i class="fa-solid fa-arrow-right-long"></i></button>
</div>

</body>
</html>
